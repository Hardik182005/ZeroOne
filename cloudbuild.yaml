steps:
  # ── Step 1: Build the Docker image ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/zeroone/app:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/zeroone/app:latest
      - .

  # ── Step 2: Push to Artifact Registry ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/zeroone/app

  # ── Step 3: Deploy to Cloud Run ──────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - zeroone
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/zeroone/app:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=60
      - --set-secrets=GROQ_API_KEY=GROQ_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,ELEVENLABS_API_KEY=ELEVENLABS_API_KEY:latest,ELEVENLABS_VOICE_ID=ELEVENLABS_VOICE_ID:latest,REDIS_URL=REDIS_URL:latest,ANAKIN_API_KEY=ANAKIN_API_KEY:latest,CORS_ORIGINS=CORS_ORIGINS:latest
      - --set-env-vars=APP_ENV=production

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/zeroone/app

options:
  logging: CLOUD_LOGGING_ONLY
